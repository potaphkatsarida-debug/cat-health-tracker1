<!doctype html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f78fbd" />
  <title>Cat Care Tracker</title>
  <style>
    :root{
      --ink:#2d1720;--muted:#7d5667;--pink:#f78fbd;--hot:#ee5f9f;--soft:#fff4fa;--card:rgba(255,255,255,.94);--border:#ffe0ec;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:#fff7fb;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 0%,rgba(247,143,189,.55),transparent 33rem),radial-gradient(circle at 90% 20%,rgba(171,226,255,.35),transparent 28rem),linear-gradient(180deg,#fff7fb,#fffdf8)}
    .dark{--ink:#fff5fa;--muted:#d9b7c6;--soft:#24131b;--card:rgba(38,22,31,.94);--border:rgba(255,255,255,.14);background:#150b10;color:#fff5fa}
    .dark body{background:#150b10}
    .app{max-width:1050px;margin:auto;padding:1rem 1rem 5rem}
    .hero,.card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:1rem;box-shadow:0 18px 50px rgba(111,50,78,.13);margin:1rem 0}
    .hero h1{font-size:clamp(2.2rem,8vw,4.7rem);line-height:.92;letter-spacing:-.07em;margin:.2rem 0 .7rem}
    .hero p,.muted{color:var(--muted)}
    .kicker{font-weight:950;text-transform:uppercase;letter-spacing:.12em;color:#b93b70;font-size:.78rem}
    .nav{position:sticky;top:.5rem;z-index:10;background:rgba(255,247,251,.75);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:22px;padding:.5rem;display:grid;grid-template-columns:repeat(6,1fr);gap:.45rem}
    .dark .nav{background:rgba(21,11,16,.8)}
    button{border:0;border-radius:999px;padding:.72rem .95rem;font-weight:850;background:linear-gradient(135deg,var(--hot),var(--pink));color:#fff;display:inline-flex;align-items:center;justify-content:center;gap:.35rem;cursor:pointer}
    button.ghost{background:#fff;color:#b93b70;border:1px solid #ffd1e5}
    .dark button.ghost{background:#2d1720;color:#ffd0e3;border-color:rgba(255,255,255,.14)}
    button.danger{background:#fff0f0;color:#b42323}
    .nav button{background:#fff;color:#674153;border:1px solid #ffe0ec;box-shadow:none}
    .dark .nav button{background:#2d1720;color:#f4c7da;border-color:rgba(255,255,255,.12)}
    .nav button.active{background:linear-gradient(135deg,var(--hot),var(--pink));color:#fff}
    .cats{display:flex;gap:.6rem;overflow:auto;padding:.8rem 0}
    .catpill{flex:0 0 auto;background:#fff;color:var(--ink);border:1px solid var(--border)}
    .dark .catpill{background:#2d1720}
    .catpill.active{background:#2d1720;color:#fff}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem}
    .wide{grid-column:1/-1}
    input,select,textarea{width:100%;border:1px solid #ffd3e5;background:#fffafd;color:#2d1720;border-radius:16px;padding:.82rem .9rem;margin:.25rem 0;outline:none}
    .dark input,.dark textarea,.dark select{background:#1c0f15;color:#fff5fa;border-color:rgba(255,255,255,.14)}
    textarea{min-height:90px;resize:vertical}
    label{font-weight:800;color:#6f4256}
    .dark label{color:#f1bed2}
    .profiles{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem}
    .profile,.item,.log{background:var(--soft);border:1px solid var(--border);border-radius:20px;padding:1rem;margin:.6rem 0}
    .profile{display:grid;grid-template-columns:auto 1fr;gap:1rem}
    .avatar{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#ffe3ef,#e6f8ff);display:grid;place-items:center;overflow:hidden;font-size:1.7rem;border:2px solid #fff}
    .avatar.large{width:120px;height:120px;border-radius:30px}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .chips{display:flex;flex-wrap:wrap;gap:.4rem;margin:.5rem 0}
    .chips span{background:#fff;border:1px solid #ffd3e5;color:#684153;border-radius:999px;padding:.3rem .55rem;font-size:.9rem;font-weight:750}
    .dark .chips span{background:#24131b;color:#f3c7d9;border-color:rgba(255,255,255,.14)}
    .note{background:#e6f8ff;border:1px solid #c9efff;color:#315869;border-radius:16px;padding:.7rem;margin:.5rem 0;font-weight:700}
    .dark .note{background:#17313d;color:#caecfa;border-color:rgba(255,255,255,.14)}
    .row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
    .between{display:flex;justify-content:space-between;gap:.7rem;align-items:flex-start}
    .alert{padding:.82rem;border-radius:16px;background:#fff2ca;border:1px solid #ffe08b;color:#6c4c00;font-weight:850;margin:.55rem 0}
    .toast{position:fixed;top:1rem;right:1rem;z-index:99;background:#2d1720;color:#fff;padding:.8rem 1rem;border-radius:999px;font-weight:900;box-shadow:0 16px 40px #0004}
    .hidden{display:none!important}
    .photoInput{display:none}
    .chart{height:220px;display:flex;align-items:end;gap:.45rem;border-left:2px solid var(--border);border-bottom:2px solid var(--border);padding:.5rem;margin:1rem 0;overflow:auto}
    .bar{min-width:30px;background:linear-gradient(180deg,var(--pink),var(--hot));border-radius:10px 10px 0 0;position:relative}
    .bar small{position:absolute;bottom:-1.5rem;left:0;font-size:.7rem;color:var(--muted);white-space:nowrap}
    @media(max-width:820px){.app{padding:.7rem  .7rem 5rem}.nav{grid-template-columns:repeat(6,minmax(64px,1fr));overflow:auto}.nav button{font-size:.72rem;padding:.62rem .45rem;flex-direction:column}.grid,.profiles{grid-template-columns:1fr}.profile{display:flex;flex-direction:column}.hero h1{font-size:3rem}.toast{left:1rem;right:1rem;text-align:center}}
  </style>
</head>
<body>
<div class="app">
  <div id="toast" class="toast hidden"></div>

  <header class="hero">
    <div class="kicker">🐾 Cat Care 1.5 Static</div>
    <h1>Cat Care Tracker</h1>
    <p>Στατική έκδοση χωρίς npm/build/dependencies. Προφίλ, επεξεργασία, φωτογραφίες, φάρμακα, logs, βάρος, backup και καθαρά alerts.</p>
  </header>

  <nav class="nav">
    <button data-tab="home" class="active">🏠 Σήμερα</button>
    <button data-tab="cats">🐱 Γάτες</button>
    <button data-tab="meds">💊 Φάρμακα</button>
    <button data-tab="logs">❤️ Ιστορικό</button>
    <button data-tab="weight">⚖️ Βάρος</button>
    <button data-tab="backup">💾 Backup</button>
  </nav>

  <section id="catSelector" class="cats"></section>
  <main id="content"></main>
</div>

<script>
const STORAGE_KEY='cat-care-static-v1-5';
let data=loadData();
let selectedCatId=data.cats[0]?.id||'';
let tab='home';
let editingCatId=null;
let searchQuery='';

function uuid(){return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random())}
function today(){return new Date().toISOString().slice(0,10)}
function now(){return new Date().toISOString()}
function nice(v){try{return new Date(v).toLocaleString('el-GR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}catch{return v}}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),1600)}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
function defaultData(){return {cats:[
{id:uuid(),name:'Πουσαισυ',age:'13',weight:'7.7',sex:'Αρσενικός',neutered:'ναι',description:'Άρχοντας του καναπέ',conditions:'Χρόνια δυσκοιλιότητα, αρθρίτιδα στη σπονδυλική στήλη, λιπώδης διήθηση ήπατος.',notes:'Παρακολούθηση κοπράνων, όρεξης, κινητικότητας και κοιλιακής διάτασης.',photo:''},
{id:uuid(),name:'Σίσου',age:'5',weight:'4.4',sex:'Αρσενικός',neutered:'όχι/άγνωστο',description:'Ευαίσθητος κύριος',conditions:'Ευαίσθητο γαστρεντερικό, ιστορικό κυστίτιδας/αιματουρίας.',notes:'Παρακολούθηση ούρων, στρες, όρεξης και διαρροιών.',photo:''}
],meds:[],events:[],logs:[],weights:[],settings:{dark:false}}}
function loadData(){try{let x=JSON.parse(localStorage.getItem(STORAGE_KEY));if(x&&Array.isArray(x.cats))return x}catch{} return defaultData()}
function cat(){return data.cats.find(c=>c.id===selectedCatId)||data.cats[0]}
function newest(arr,field='date'){return [...arr].sort((a,b)=>String(b[field]).localeCompare(String(a[field])))}
function avatar(c,large=false){return `<div class="avatar ${large?'large':''}">${c.photo?`<img src="${c.photo}">`:'🐱'}</div>`}
function setTab(t){tab=t;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));render()}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));

function render(){
  document.documentElement.classList.toggle('dark',!!data.settings?.dark);
  renderCatSelector();
  const c=cat();
  if(!c && tab!=='cats'){document.getElementById('content').innerHTML='<section class="card">Δεν υπάρχουν γάτες.</section>';return}
  if(tab==='home') renderHome();
  if(tab==='cats') renderCats();
  if(tab==='meds') renderMeds();
  if(tab==='logs') renderLogs();
  if(tab==='weight') renderWeight();
  if(tab==='backup') renderBackup();
}

function renderCatSelector(){
  document.getElementById('catSelector').innerHTML=data.cats.map(c=>`
    <button class="catpill ${c.id===selectedCatId?'active':''}" onclick="selectCat('${c.id}')">${avatar(c)} <span>${esc(c.name)}</span></button>
  `).join('');
}
window.selectCat=id=>{selectedCatId=id;render()}

function buildAlerts(){
  const out=[];
  data.cats.forEach(c=>{
    const last=newest(data.logs.filter(l=>l.catId===c.id),'date')[0];
    if(!last)return;
    if(['μειωμένη','καθόλου'].includes(last.appetite))out.push(`${c.name}: μειωμένη/καθόλου όρεξη.`);
    if(['αίμα','σφίξιμο'].includes(last.urine))out.push(`${c.name}: πρόβλημα στα ούρα — θέλει προσοχή.`);
    if(['δυσκοιλιότητα','καθόλου'].includes(last.stool))out.push(`${c.name}: θέμα με κόπρανα στο τελευταίο log.`);
    if(last.vomiting==='ναι')out.push(`${c.name}: καταγράφηκε έμετος.`);
    if(last.pain==='έντονη ενόχληση')out.push(`${c.name}: έντονη ενόχληση/πόνος.`);
  });
  return out;
}

function dueStatus(m){
  if(!m.frequencyHours)return 'Χωρίς πρόγραμμα';
  const ev=newest(data.events.filter(e=>e.medId===m.id),'givenAt')[0];
  if(!ev)return 'Δεν έχει δοθεί ακόμα';
  const elapsed=(Date.now()-new Date(ev.givenAt).getTime())/36e5;
  const h=Number(m.frequencyHours);
  if(elapsed>h+2)return `Πέρασε το πρόγραμμα (${Math.round(elapsed-h)}h)`;
  if(elapsed>h-1)return 'Πλησιάζει ώρα';
  return `ΟΚ (${Math.max(0,Math.round(h-elapsed))}h)`;
}

function renderHome(){
  const c=cat(), alerts=buildAlerts(), meds=data.meds.filter(m=>m.catId===c.id), events=newest(data.events.filter(e=>e.catId===c.id),'givenAt');
  document.getElementById('content').innerHTML=`
  <section class="grid">
    <div class="card wide between">
      ${avatar(c,true)}
      <div style="flex:1">
        <div class="kicker">Ενεργό προφίλ</div>
        <h2>${esc(c.name)}</h2>
        <p class="muted">${esc(c.description)}</p>
        <div class="chips">${chip(c.age&&c.age+' ετών')}${chip(c.weight&&c.weight+' kg')}${chip(c.sex)}${chip(c.neutered&&'Στείρωση: '+c.neutered)}</div>
        ${c.conditions?`<div class="note">${esc(c.conditions)}</div>`:''}
        <button onclick="editFromHome('${c.id}')">✏️ Επεξεργασία προφίλ</button>
      </div>
    </div>
    <div class="card"><h2>⚠️ Προειδοποιήσεις</h2>${alerts.length?alerts.map(a=>`<div class="alert">${esc(a)}</div>`).join(''):'<p class="muted">Δεν υπάρχουν ενεργές προειδοποιήσεις.</p>'}</div>
    <div class="card"><h2>💊 Φάρμακα</h2>${meds.length?meds.map(m=>medItem(m)).join(''):'<p class="muted">Δεν έχεις καταχωρήσει φάρμακα για αυτή τη γάτα.</p>'}</div>
    <div class="card"><h2>🕘 Τελευταίες χορηγήσεις</h2>${events.length?events.slice(0,6).map(e=>`<div class="item"><b>${esc(e.medName)}</b><span class="muted">${esc(e.dose)} • ${nice(e.givenAt)}</span></div>`).join(''):'<p class="muted">Δεν υπάρχουν χορηγήσεις.</p>'}</div>
  </section>`;
}
window.editFromHome=id=>{editingCatId=id;setTab('cats')}

function chip(v){return v?`<span>${esc(v)}</span>`:''}
function medItem(m){return `<div class="item between"><div><b>${esc(m.name)}</b><br><span class="muted">${esc(m.dose)} • ${esc(m.frequency)}</span><br><em>${esc(dueStatus(m))}</em></div><button onclick="giveMed('${m.id}')">✅ Δόθηκε</button></div>`}
window.giveMed=id=>{const m=data.meds.find(x=>x.id===id);if(!m)return;data.events.unshift({id:uuid(),catId:m.catId,medId:m.id,medName:m.name,dose:m.dose,givenAt:now()});save();toast('Καταγράφηκε χορήγηση');render()}

function renderCats(){
 const edit=data.cats.find(c=>c.id===editingCatId);
 document.getElementById('content').innerHTML=`
 <section class="grid">
  <form class="card" onsubmit="${edit?'submitEditCat':'submitAddCat'}(event)">
    <div class="between"><h2>${edit?'✏️ Επεξεργασία: '+esc(edit.name):'➕ Νέα γάτα'}</h2>${edit?'<button type="button" class="ghost" onclick="cancelEdit()">Άκυρο</button>':''}</div>
    <input name="name" placeholder="Όνομα" value="${esc(edit?.name||'')}">
    <input name="age" placeholder="Ηλικία" value="${esc(edit?.age||'')}">
    <input name="weight" placeholder="Βάρος π.χ. 4.4" value="${esc(edit?.weight||'')}">
    <input name="sex" placeholder="Φύλο" value="${esc(edit?.sex||'')}">
    <select name="neutered">
      <option value="" ${!edit?.neutered?'selected':''}>Στείρωση: άγνωστο/κενό</option>
      <option value="ναι" ${edit?.neutered==='ναι'?'selected':''}>Στειρωμένος/η: ναι</option>
      <option value="όχι" ${edit?.neutered==='όχι'?'selected':''}>Στειρωμένος/η: όχι</option>
      <option value="προγραμματισμένο" ${edit?.neutered==='προγραμματισμένο'?'selected':''}>Στείρωση: προγραμματισμένη</option>
    </select>
    <input name="description" placeholder="Χαρακτηρισμός" value="${esc(edit?.description||'')}">
    <textarea name="conditions" placeholder="Χρόνια προβλήματα">${esc(edit?.conditions||'')}</textarea>
    <textarea name="notes" placeholder="Σημειώσεις">${esc(edit?.notes||'')}</textarea>
    <button>💾 ${edit?'Αποθήκευση αλλαγών':'Προσθήκη'}</button>
  </form>
  <section class="card wide"><h2>🐾 Προφίλ</h2><div class="profiles">${data.cats.map(profileCard).join('')}</div></section>
 </section>`;
}
function profileCard(c){return `<article class="profile">
 <div>${avatar(c,true)}<br><label class="ghost uploadBtn"><input class="photoInput" type="file" accept="image/*" onchange="photo('${c.id}',this.files[0])">📷 Φωτογραφία</label></div>
 <div><h3>${esc(c.name)}</h3><p class="muted">${esc(c.description||'Χωρίς περιγραφή')}</p>
 <div class="chips">${chip(c.age&&c.age+' ετών')}${chip(c.weight&&c.weight+' kg')}${chip(c.sex)}${chip(c.neutered&&'Στείρωση: '+c.neutered)}</div>
 ${c.conditions?`<div class="note">${esc(c.conditions)}</div>`:''}${c.notes?`<p>${esc(c.notes)}</p>`:''}
 <div class="row"><button onclick="startEdit('${c.id}')">✏️ Επεξεργασία</button><button class="danger" onclick="deleteCat('${c.id}')">🗑️ Διαγραφή</button></div></div>
 </article>`}
window.startEdit=id=>{editingCatId=id;render()}
window.cancelEdit=()=>{editingCatId=null;render()}
window.submitAddCat=e=>{e.preventDefault();const f=new FormData(e.target);const c={id:uuid(),name:f.get('name').trim(),age:f.get('age').trim(),weight:f.get('weight').trim(),sex:f.get('sex').trim(),neutered:f.get('neutered'),description:f.get('description').trim(),conditions:f.get('conditions').trim(),notes:f.get('notes').trim(),photo:''};if(!c.name)return alert('Βάλε όνομα.');data.cats.push(c);selectedCatId=c.id;save();toast('Προστέθηκε γάτα');e.target.reset();render()}
window.submitEditCat=e=>{e.preventDefault();const c=data.cats.find(x=>x.id===editingCatId);if(!c)return;const f=new FormData(e.target);Object.assign(c,{name:f.get('name').trim(),age:f.get('age').trim(),weight:f.get('weight').trim(),sex:f.get('sex').trim(),neutered:f.get('neutered'),description:f.get('description').trim(),conditions:f.get('conditions').trim(),notes:f.get('notes').trim()});if(!c.name)return alert('Το όνομα δεν μπορεί να είναι κενό.');selectedCatId=c.id;editingCatId=null;save();toast('Οι αλλαγές αποθηκεύτηκαν');render()}
window.deleteCat=id=>{if(!confirm('Να διαγραφεί μαζί με ιστορικό;'))return;data.cats=data.cats.filter(c=>c.id!==id);data.meds=data.meds.filter(m=>m.catId!==id);data.events=data.events.filter(e=>e.catId!==id);data.logs=data.logs.filter(l=>l.catId!==id);data.weights=data.weights.filter(w=>w.catId!==id);selectedCatId=data.cats[0]?.id||'';save();render()}
window.photo=(id,file)=>{if(!file)return;const r=new FileReader();r.onload=()=>{const c=data.cats.find(x=>x.id===id);c.photo=String(r.result);save();toast('Η φωτογραφία αποθηκεύτηκε');render()};r.readAsDataURL(file)}

function renderMeds(){
 const c=cat(), meds=data.meds.filter(m=>m.catId===c.id);
 document.getElementById('content').innerHTML=`<section class="grid">
 <form class="card" onsubmit="addMed(event)"><h2>💊 Νέο φάρμακο για ${esc(c.name)}</h2>
 <input name="name" placeholder="Όνομα φαρμάκου"><input name="dose" placeholder="Δόση π.χ. 1 ml"><input name="frequency" placeholder="Συχνότητα π.χ. κάθε βράδυ"><input type="number" min="1" name="frequencyHours" placeholder="Κάθε πόσες ώρες; προαιρετικό"><textarea name="notes" placeholder="Σημειώσεις"></textarea><button>➕ Προσθήκη</button></form>
 <section class="card"><h2>📋 Λίστα φαρμάκων</h2>${meds.length?meds.map(m=>`<div class="item between"><div><b>${esc(m.name)}</b><br><span class="muted">${esc(m.dose)} • ${esc(m.frequency)}</span><br><em>${esc(dueStatus(m))}</em>${m.notes?`<p>${esc(m.notes)}</p>`:''}</div><div class="row"><button onclick="giveMed('${m.id}')">Δόθηκε</button><button class="ghost" onclick="deleteMed('${m.id}')">🗑️</button></div></div>`).join(''):'<p class="muted">Δεν υπάρχουν φάρμακα.</p>'}</section>
 </section>`;
}
window.addMed=e=>{e.preventDefault();const f=new FormData(e.target);const m={id:uuid(),catId:selectedCatId,name:f.get('name').trim(),dose:f.get('dose').trim(),frequency:f.get('frequency').trim(),frequencyHours:f.get('frequencyHours').trim(),notes:f.get('notes').trim()};if(!m.name)return alert('Βάλε φάρμακο.');data.meds.push(m);save();toast('Προστέθηκε φάρμακο');e.target.reset();render()}
window.deleteMed=id=>{data.meds=data.meds.filter(m=>m.id!==id);data.events=data.events.filter(e=>e.medId!==id);save();render()}

function renderLogs(){
 const c=cat();
 const logs=newest(data.logs.filter(l=>l.catId===c.id),'date').filter(l=>JSON.stringify(l).toLowerCase().includes(searchQuery.toLowerCase()));
 document.getElementById('content').innerHTML=`<section class="grid">
 <form class="card" onsubmit="addLog(event)"><h2>❤️ Νέα εγγραφή για ${esc(c.name)}</h2>
 <label>Ημερομηνία</label><input type="date" name="date" value="${today()}">
 ${select('appetite','Όρεξη',['καλή','μειωμένη','καθόλου'])}${select('water','Νερό',['φυσιολογικό','αυξημένο','μειωμένο'])}${select('urine','Ούρα',['φυσιολογικά','μειωμένα','αίμα','σφίξιμο'])}${select('stool','Κόπρανα',['φυσιολογικά','μαλακά','διάρροια','δυσκοιλιότητα','καθόλου'])}${select('vomiting','Έμετος',['όχι','ναι'])}${select('mood','Διάθεση',['φυσιολογική','ήσυχος/η','κρύβεται','ανήσυχος/η'])}${select('pain','Πόνος/ενόχληση',['όχι εμφανής','ήπια ενόχληση','έντονη ενόχληση'])}
 <textarea name="notes" placeholder="Σημειώσεις"></textarea><button>💾 Αποθήκευση</button></form>
 <section class="card"><h2>📜 Timeline</h2><input placeholder="Αναζήτηση" value="${esc(searchQuery)}" oninput="searchLogs(this.value)">${logs.length?logs.map(logCard).join(''):'<p class="muted">Δεν υπάρχουν εγγραφές.</p>'}</section>
 </section>`;
}
function select(name,label,opts){return `<label>${label}</label><select name="${name}">${opts.map(o=>`<option>${o}</option>`).join('')}</select>`}
function logCard(l){return `<article class="log"><div class="between"><b>${esc(l.date)}</b><button class="ghost" onclick="deleteLog('${l.id}')">🗑️</button></div><div class="chips">${chip('Όρεξη: '+l.appetite)}${chip('Νερό: '+l.water)}${chip('Ούρα: '+l.urine)}${chip('Κόπρανα: '+l.stool)}${chip('Έμετος: '+l.vomiting)}${chip('Διάθεση: '+l.mood)}${chip('Πόνος: '+l.pain)}</div>${l.notes?`<p>${esc(l.notes)}</p>`:''}</article>`}
window.searchLogs=v=>{searchQuery=v;renderLogs()}
window.addLog=e=>{e.preventDefault();const f=new FormData(e.target);data.logs.unshift({id:uuid(),catId:selectedCatId,date:f.get('date')||today(),appetite:f.get('appetite'),water:f.get('water'),urine:f.get('urine'),stool:f.get('stool'),vomiting:f.get('vomiting'),mood:f.get('mood'),pain:f.get('pain'),notes:f.get('notes').trim(),createdAt:now()});save();toast('Αποθηκεύτηκε εγγραφή');e.target.reset();render()}
window.deleteLog=id=>{data.logs=data.logs.filter(l=>l.id!==id);save();render()}

function renderWeight(){
 const c=cat(), ws=newest(data.weights.filter(w=>w.catId===c.id),'date').reverse();
 const max=Math.max(...ws.map(w=>Number(w.weight)),1), min=Math.min(...ws.map(w=>Number(w.weight)),0);
 document.getElementById('content').innerHTML=`<section class="grid">
 <form class="card" onsubmit="addWeight(event)"><h2>⚖️ Νέα μέτρηση βάρους</h2><label>Ημερομηνία</label><input type="date" name="date" value="${today()}"><input inputmode="decimal" name="weight" placeholder="Βάρος σε kg π.χ. 7.7"><button>💾 Αποθήκευση</button></form>
 <section class="card"><h2>📈 Γράφημα βάρους</h2>${ws.length<2?'<p class="muted">Βάλε τουλάχιστον 2 μετρήσεις για γράφημα.</p>':`<div class="chart">${ws.map(w=>{let h=40+((Number(w.weight)-min)/(max-min||1))*160;return `<div class="bar" style="height:${h}px" title="${w.weight} kg"><small>${esc(w.date.slice(5))}</small></div>`}).join('')}</div>`}${ws.slice().reverse().map(w=>`<div class="item between"><b>${esc(w.date)}</b><span>${esc(w.weight)} kg</span><button class="ghost" onclick="deleteWeight('${w.id}')">🗑️</button></div>`).join('')}</section>
 </section>`;
}
window.addWeight=e=>{e.preventDefault();const f=new FormData(e.target);const weight=Number(String(f.get('weight')).replace(',','.'));if(!weight)return alert('Βάλε σωστό βάρος.');data.weights.push({id:uuid(),catId:selectedCatId,date:f.get('date')||today(),weight});save();toast('Αποθηκεύτηκε βάρος');e.target.reset();render()}
window.deleteWeight=id=>{data.weights=data.weights.filter(w=>w.id!==id);save();render()}

function renderBackup(){
 document.getElementById('content').innerHTML=`<section class="grid">
 <section class="card"><h2>💾 Backup & Ρυθμίσεις</h2><p class="muted">Τα δεδομένα σώζονται τοπικά στη συσκευή/browser. Κάνε backup συχνά.</p><div class="row"><button onclick="exportBackup()">⬇️ Εξαγωγή JSON</button><label class="uploadBtn ghost"><input class="photoInput" type="file" accept="application/json" onchange="importBackup(this.files[0])">⬆️ Εισαγωγή backup</label><button class="ghost" onclick="toggleDark()">${data.settings.dark?'☀️ Light':'🌙 Dark'}</button></div></section>
 <section class="card"><h2>⚠️ Σημαντικό</h2><p>Η εφαρμογή είναι ημερολόγιο φροντίδας, όχι κτηνίατρος. Σε αιματουρία, ανορεξία, επίμονους εμέτους, έντονη κατάπτωση ή δυσκολία ούρησης/αφόδευσης, επικοινωνία με κτηνίατρο.</p></section>
 </section>`;
}
window.exportBackup=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='cat-care-backup-'+today()+'.json';a.click();URL.revokeObjectURL(url)}
window.importBackup=file=>{if(!file)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(String(r.result));if(!Array.isArray(x.cats))throw 0;data=x;selectedCatId=data.cats[0]?.id||'';save();toast('Το backup φορτώθηκε');render()}catch{alert('Λάθος αρχείο backup')}};r.readAsText(file)}
window.toggleDark=()=>{data.settings.dark=!data.settings.dark;save();render()}

render();
</script>
</body>
</html>
